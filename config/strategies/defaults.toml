# Strategy defaults configuration (D7 — config keys live in config/)
# Used by intent capture to fill non-identity fields when operator omits them.
# Each default includes value and rationale for provenance transparency.

[defaults.pair]
value = "EURUSD"
rationale = "MVP scope single pair"

[defaults.timeframe]
value = "H1"
rationale = "MVP scope primary analysis timeframe"

[defaults.position_sizing]
