# Indicator Registry Contract (D10, Story 2.3)
# Single source of truth for known indicator types.
# Both Python (Story 2.3) and Rust (Story 2.8) consume this file.
# Seeded from Story 2.1 indicator catalogue (20 indicators) + hidden_smash_day (21 total).
# Extensible: add indicators here without code changes.

# --- Trend Indicators ---

[indicators.sma]
name = "SMA"
category = "trend"
description = "Simple Moving Average"
required_params = ["period"]
optional_params = []

[indicators.ema]
name = "EMA"
category = "trend"
description = "Exponential Moving Average"
required_params = ["period"]
optional_params = []

[indicators.ema_crossover]
name = "EMA Crossover"
category = "trend"
description = "EMA fast/slow crossover signal"
required_params = ["fast_period", "slow_period"]
optional_params = []

[indicators.sma_crossover]
name = "SMA Crossover"
category = "trend"
description = "SMA fast/slow crossover signal"
required_params = ["fast_period", "slow_period"]
optional_params = []

# --- Volatility Indicators ---

[indicators.true_range]
name = "True Range"
category = "volatility"
description = "True Range (single bar)"
required_params = []
optional_params = []

[indicators.atr]
name = "ATR"
category = "volatility"
description = "Average True Range (Wilder's smoothing)"
required_params = ["period"]
optional_params = []

[indicators.bollinger_bands]
name = "Bollinger Bands"
category = "volatility"
description = "Bollinger Bands (middle, upper, lower)"
